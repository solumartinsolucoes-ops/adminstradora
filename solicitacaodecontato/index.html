<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitação de Contato</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#04102e,#0f2f73,#04102e);
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
background:rgba(0,0,0,0.25);
backdrop-filter:blur(8px);
padding:45px 30px;
border-radius:24px;
max-width:520px;
width:100%;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

.logo{
width:320px;
max-width:95%;
margin-bottom:25px;
}

h1{
font-size:38px;
margin-bottom:10px;
}

p{
font-size:20px;
color:#dbeafe;
margin-bottom:30px;
}

.botao{
display:block;
width:100%;
padding:18px;
margin:12px 0;
border-radius:50px;
text-decoration:none;
font-size:21px;
font-weight:bold;
color:#fff;
transition:0.3s;
}

.botao:hover{
transform:translateY(-3px);
opacity:0.95;
}

.whats{
background:#25D366;
}

.email{
background:#2563eb;
}

.insta{
background:linear-gradient(45deg,#833AB4,#E1306C,#F77737);
}

.voltar{
background:#111827;
border:1px solid #3b82f6;
}

@media(max-width:768px){

h1{
font-size:30px;
}

p{
font-size:18px;
}

.logo{
width:250px;
}

}
</style>
</head>

<body>

<div class="box">

<img src="../logo.png" class="logo">

<h1>Solicitação de Contato</h1>

<p>Fale com nossa equipe agora mesmo</p>

<a class="botao whats" href="https://wa.me/5554981667187" target="_blank">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</a>

<a class="botao email" href="mailto:solumartin.solucoes@gmail.com">
<i class="fa-solid fa-envelope"></i> E-mail
</a>

<a class="botao insta" href="https://www.instagram.com/solumartin_solucoes/" target="_blank">
<i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="botao voltar" href="../">
Voltar ao Site
</a>

</div>

</body>
</html>
